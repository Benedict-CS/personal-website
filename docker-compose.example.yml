services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: personal-website-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-ben}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-blog}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ben} -d ${POSTGRES_DB:-blog}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RustFS S3-compatible Object Storage
  # RustFS is a high-performance, distributed object storage system built in Rust
  # Documentation: https://rustfs.com
  rustfs:
    image: rustfs/rustfs:latest
    container_name: personal-website-rustfs
    restart: unless-stopped
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Console
    volumes:
      - ./rustfs-data:/data
      - ./rustfs-logs:/logs
    environment:
      - RUSTFS_ROOT_USER=${RUSTFS_ROOT_USER:-rustfsadmin}
      - RUSTFS_ROOT_PASSWORD=${RUSTFS_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_USE_TURBOPACK: ${NEXT_USE_TURBOPACK:-0}
    container_name: personal-website-app
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: ${APP_MEM_LIMIT:-2g}
    cpus: ${APP_CPUS:-2.0}
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    ports:
      - "${APP_HOST_PORT:-3000}:3000"
    volumes:
      # Mount public directory for CV and image uploads (persistent storage)
      - ./public:/app/public
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=${NODE_MAX_OLD_SPACE_SIZE:-2048}
      - UV_THREADPOOL_SIZE=${UV_THREADPOOL_SIZE:-8}
      - MALLOC_ARENA_MAX=${MALLOC_ARENA_MAX:-2}
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ben}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-blog}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://benedict.winlab.tw}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://benedict.winlab.tw}
      # S3/RustFS Configuration
      - S3_ENDPOINT=http://rustfs:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-uploads}
      # Optional: copy from .env — Compose only passes variables listed here into the container
      - ACCESS_BLOCK_IP_PREFIXES=${ACCESS_BLOCK_IP_PREFIXES:-}
      - ACCESS_BLOCK_PUBLIC=${ACCESS_BLOCK_PUBLIC:-}
      - ACCESS_ALLOW_IPS=${ACCESS_ALLOW_IPS:-}
      - ANALYTICS_SECRET=${ANALYTICS_SECRET:-}
      - ANALYTICS_EXCLUDED_IPS=${ANALYTICS_EXCLUDED_IPS:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
