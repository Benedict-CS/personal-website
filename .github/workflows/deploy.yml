# CD: Deploy to server on push to main (benedict.winlab.tw)
# Requires GitHub Secrets: DEPLOY_HOST, DEPLOY_USER, SSH_PRIVATE_KEY
# Optional: DEPLOY_PATH (default: ~/personal-website)

name: CD - Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NEXTAUTH_SECRET: dummy-secret
          NEXTAUTH_URL: https://benedict.winlab.tw

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "${DEPLOY_PATH:-$HOME/personal-website}"
            CI=1 ./scripts/manual-deploy.sh
