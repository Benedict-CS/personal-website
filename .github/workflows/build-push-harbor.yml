  HARBOR_USERNAME: robot$test
  HARBOR_PASSWORD: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NzQwODA1NTYsImlhdCI6MTc3MTQ4ODU1NiwiaXNzIjoiaGFyYm9yLXRva2VuLWRlZmF1bHRJc3N1ZXIiLCJpZCI6MiwicGlkIjoyLCJhY2Nlc3MiOlt7IlJlc291cmNlIjoiL3Byb2plY3QvMi9yZXBvc2l0b3J5IiwiQWN0aW9uIjoicHVzaCIsIkVmZmVjdCI6IiJ9XX0.mwigpEesSXROagaVa6APxezmdXtQB_5OlfaWvz8CdRwIyERpXOZfQ5GUqnZ8Yh3479WWUdQBJqYlptIPYBEUCigqJ-4wM68BIx2gzLWSPDAEcf6cflnC_aRKJzD1r4AtVomssVYI4KxLe_KQuPmwMbZecg7Obcn_Nl1T36LsxaT8jlxvYDh05Ck5KgJAYr4wtoaHlAOep2mUob6Hx2-2hV3GT6wkfGmfMYpZoj5jG1DxILWzzM01E8_2QoPPSZI_3bMAp82cXsfRbjdphDOQ046yEzm1hO1hFOf-0zopVmP269iUFWRegegc6jt4ZMWle6qDXYzqs9RGF8hWX_zrcknauQVZLNID58gIEQ3pon5jkrn_4c4Y4dqb6mPUeqIuM5QIZ_OQQlcdJBrA5rDzHGOYbzyE6qJOCrc6iZyCO1Y4ajsHBPlVMc_1gcdfAHpFMKdx9Ae4HT37PQIzkf3YIcyWIx6OLM7c4cDQUbSKeimYsCklghRWvolOeSZY7YLaOfgA5hTN2GvgHJWvnnRgVqQNwYbvtjHm9snxkLyQSuIADurCFvRDXXUT4D2erwsVYHBsvQ-n5vKiIf-45yVXDJyX0TZIBDLqhvqu6z88YcOdew2CmHzdsZ9rzLMMg4cEXP4Mk0bM_X18jQs7WDYlfvUczCvoT3oqS_lhvZ7WCzI
  HARBOR_PROJECT: personal-website

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_HOST }}
          username: ${{ env.HARBOR_USERNAME }}
          password: ${{ env.HARBOR_PASSWORD }}

      - name: Set Harbor project
        id: project
        env:
          HARBOR_PROJECT: ${{ env.HARBOR_PROJECT }}
        run: echo "project=${HARBOR_PROJECT:-library}" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.HARBOR_HOST }}/${{ steps.project.outputs.project }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Debug – push target and Harbor token
        env:
          HARBOR_HOST: ${{ env.HARBOR_HOST }}
          HARBOR_USERNAME: ${{ env.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ env.HARBOR_PASSWORD }}
          PROJECT: ${{ steps.project.outputs.project }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          echo "=== Push target (host masked if from Secrets) ==="
          echo "registry=$HARBOR_HOST"
          echo "project=$PROJECT"
          echo "image=$IMAGE_NAME"
          echo "full_repo=$HARBOR_HOST/$PROJECT/$IMAGE_NAME"
          echo ""
          echo "=== Harbor token API (to see exact 403 body) ==="
          SCOPE="repository:$PROJECT/$IMAGE_NAME:pull,push"
          URL="https://$HARBOR_HOST/service/token?service=harbor-registry&scope=$SCOPE"
          echo "url=$URL"
          HTTP=$(curl -s -w "\n%{http_code}" -u "$HARBOR_USERNAME:$HARBOR_PASSWORD" "$URL")
          CODE=$(echo "$HTTP" | tail -n1)
          BODY=$(echo "$HTTP" | sed '$d')
          echo "http_status=$CODE"
          echo "response_body<<EOF"
          echo "$BODY"
          echo "EOF"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
