# Build Docker image and push to Harbor (CD)
# Requires repo Secrets: HARBOR_HOST, HARBOR_USERNAME, HARBOR_PASSWORD, HARBOR_PROJECT
name: Build and Push to Harbor

#on:
#  push:
#    branches: [main, master]
#  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: personal-website

concurrency:
  group: harbor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Harbor
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set Harbor project
        id: project
        env:
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
        run: echo "project=${HARBOR_PROJECT:-library}" >> $GITHUB_OUTPUT

      - name: Verify registry auth (token API)
        env:
          HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
          PROJECT: ${{ steps.project.outputs.project }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          SCOPE="repository:$PROJECT/$IMAGE_NAME:pull,push"
          URL="https://$HARBOR_HOST/service/token?service=harbor-registry&scope=$SCOPE"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -u "$HARBOR_USERNAME:$HARBOR_PASSWORD" "$URL")
          echo "Token API (GET) -> $CODE (200 = credentials OK, 401 = bad user/token, 403 = no push permission)"
          if [ "$CODE" != "200" ]; then
            echo "::error::Registry auth failed ($CODE). Fix credentials or Robot push permission, then retry."
            exit 1
          fi

      - name: Build image
        env:
          HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
        run: |
          IMAGE="$HARBOR_HOST/${{ steps.project.outputs.project }}/${{ env.IMAGE_NAME }}:latest"
          echo "Building $IMAGE"
          docker build -t "$IMAGE" -f ./Dockerfile .
          docker save "$IMAGE" -o image.tar

      - name: Push to Harbor (skopeo from tarball – avoids Docker API version + POST 403)
        env:
          HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y skopeo
          IMAGE="$HARBOR_HOST/${{ steps.project.outputs.project }}/${{ env.IMAGE_NAME }}:latest"
          echo "Pushing $IMAGE with skopeo..."
          skopeo copy --dest-creds "$HARBOR_USERNAME:$HARBOR_PASSWORD" \
            "docker-archive:image.tar" "docker://$IMAGE"
