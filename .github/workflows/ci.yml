name: CI - Lint, Test, and Build

# Validates lint, unit tests, and production build on every PR to `test` and on demand.

on:
  pull_request:
    branches: [test]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint, unit tests, and production build
        run: npm run verify
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NEXTAUTH_SECRET: dummy-secret-for-ci-only
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Verify build output
        run: |
          if [ -d ".next" ]; then
            echo "Build output present (.next)"
          else
            echo "Missing .next after build"
            exit 1
          fi

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        run: CI=true PLAYWRIGHT_SKIP_BUILD=1 npm run test:e2e
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NEXTAUTH_SECRET: dummy-secret-for-ci-only
          # Match `playwright.config.ts` CI baseURL (`127.0.0.1` + `PLAYWRIGHT_E2E_PORT`, default 3041).
          NEXTAUTH_URL: http://127.0.0.1:3041
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3041

      - name: npm audit (critical only, informational)
        run: npm audit --audit-level=critical
        continue-on-error: true
