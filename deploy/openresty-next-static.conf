# Snippet for OpenResty/nginx in front of Next.js (standalone or next start).
# Use prefix locations so paths like /_next/static/chunks/foo~bar.js are not parsed as regex "~" routes.
# Adjust upstream host/port to match your app (Docker publish 3000, unix socket, etc.).

upstream next_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

location ^~ /_next/static/ {
    proxy_pass http://next_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}

location ^~ /_next/image {
    proxy_pass http://next_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}
